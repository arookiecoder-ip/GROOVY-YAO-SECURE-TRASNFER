services:
  filetransfer:
    build:
      context: ./app
      dockerfile: Dockerfile
    restart: unless-stopped
    network_mode: host          # cloudflared on same host → 127.0.0.1:3000
    env_file: ./app/.env
    volumes:
      - filetransfer_storage:/data/storage
      - filetransfer_chunks:/data/chunks
      - filetransfer_db:/data/db
      - filetransfer_logs:/data/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  filetransfer_storage:
  filetransfer_chunks:
  filetransfer_db:
  filetransfer_logs:
